database:
  path: "C:\\axiom\\axiom.db"
  cache_size_kb: 32768
  
ollama:
  host: "http://localhost:11434"
  model: "qwen3:4b"
  fingerprint_timeout_seconds: 5
  
runtime:
  max_threads: 4
  sequential_execution: true
  
context:
  max_bundle_kb: 500
  
sandbox:
  max_ram_mb: 256
  max_wall_clock_seconds: 60
  network_access: "denied"
  
sqlite_vec:
  max_vector_batch: 100
  
scheduler:
  stale_threshold_seconds: 120

telegram_gateway:
  enabled: false
  operator_whitelist: []
  allowed_chat_ids: []
  capability_token_sha256: []
  max_message_length: 128
  per_sender_limit_per_minute: 6
  per_chat_limit_per_minute: 12
  global_limit_per_minute: 30
  replay_window_seconds: 86400
  confirmation_expiry_seconds: 300
